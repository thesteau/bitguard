services:
  tailscale:
    image: tailscale/tailscale:latest
    container_name: btc-database-api-tailscale
    hostname: ${TS_HOSTNAME:-btc-database-api}
    env_file:
      - .env
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY}
      TS_STATE_DIR: /var/lib/tailscale
      TS_USERSPACE: "false"
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - tailscale-state:/var/lib/tailscale
    ports:
      - "8450:8450"
    restart: unless-stopped

  database-api:
    build: .
    container_name: btc-database-api
    env_file:
      - .env
    depends_on:
      - tailscale
    network_mode: "service:tailscale"
    restart: unless-stopped

volumes:
  tailscale-state:
