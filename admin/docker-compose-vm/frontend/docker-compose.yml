services:
  btc-app:
    image: ghcr.io/thesteau/btc-frontend:latest
    container_name: btc-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"