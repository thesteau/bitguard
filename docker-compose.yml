services:
  neo4j:
    image: neo4j:5-enterprise
    container_name: neo4j
    restart: unless-stopped
    stop_grace_period: 2m
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - /data/neo4j/data:/data
      - /data/neo4j/logs:/logs
      - /data/neo4j/import:/import
      - /data/neo4j/plugins:/plugins
      - /data/neo4j/conf:/conf
    environment:
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
      NEO4J_AUTH: "${NEO4J_AUTH}"
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_dbms_security_procedures_allowlist: "apoc.*"
      NEO4J_server_memory_heap_initial__size: "16G"
      NEO4J_server_memory_heap_max__size: "16G"
      NEO4J_server_memory_pagecache_size: "64G"
      NEO4J_server_directories_import: "/import"

