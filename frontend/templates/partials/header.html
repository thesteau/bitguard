{% block link %}
<link rel="stylesheet" href="/static/css/header.css?v=3">
{% endblock %}

<header class="header-inner">
  <nav class="navbar navbar-expand-lg sticky-top">
    <div class="container-fluid nav-shell">

      <a class="navbar-brand brand-wrap d-flex align-items-center gap-3" href="/">
        <div class="brand-logo-frame">
          <img src="/static/img/bitguard2.png" alt="BitGuard logo" class="brand-logo">
        </div>

        <div class="brand-copy">
          <span class="brand-name">
            <span class="bit">Bit</span><span class="guard">Guard</span>
          </span>
          <span class="brand-tagline d-none d-xl-block">AI-powered Bitcoin risk assessment</span>
        </div>
      </a>

      <button class="navbar-toggler" type="button"
        data-bs-toggle="collapse"
        data-bs-target="#mainNavbar"
        aria-controls="mainNavbar"
        aria-expanded="false"
        aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="mainNavbar">
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0 text-center text-lg-start nav-links">
          <li class="nav-item">
            <a class="nav-link" href="/">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/guide">Guides</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="https://github.com/thesteau/btc" target="_blank">GitHub</a>
          </li>
          <li class="nav-item">
            <a class="nav-link nav-cta" href="/login">Sign Up / Login</a>
          </li>
        </ul>
      </div>

    </div>
  </nav>
</header>
